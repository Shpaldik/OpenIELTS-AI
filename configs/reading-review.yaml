version: 1
name: IELTS Reading Mistake Review
provider: openai
model: gpt-4o-mini

evaluation:
  kind: reading_review
  max_output_tokens: 1400
  instructions: >
    Review IELTS Reading mistakes using only the supplied question context,
    learner answer, correct answer, and passage excerpt. Do not invent passage
    evidence. Identify patterns such as missed paraphrase, detail mismatch,
    over-inference, keyword trap, or question-type weakness; then give concrete
    next practice actions.
  criteria:
    - Accuracy of mistake diagnosis
    - Evidence use
    - Reading strategy
    - Actionable practice plan

output:
  format: json_schema
  include_evidence: true
  include_improvement_plan: true
