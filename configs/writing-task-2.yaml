version: 1
name: IELTS Academic Writing Task 2
provider: openai
model: gpt-4o-mini

evaluation:
  kind: writing
  max_output_tokens: 1600
  instructions: >
    Evaluate an IELTS Academic Writing Task 2 response. Assess the task response,
    organization, vocabulary, and grammatical range and accuracy independently.
    Do not reward memorized or needlessly ornate language. A simple, precise,
    well-developed response may score highly. Flag only meaningful issues and
    preserve the learner's intended meaning in suggested improvements.
  criteria:
    - Task Response
    - Coherence and Cohesion
    - Lexical Resource
    - Grammatical Range and Accuracy

output:
  format: json_schema
  include_evidence: true
  include_improvement_plan: true
